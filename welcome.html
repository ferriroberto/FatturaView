<!DOCTYPE html>
<html>
<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta charset="UTF-8">
<title>FatturaView</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#ec4899 100%);position:relative}
body::before{content:'';position:absolute;inset:0;background:
radial-gradient(circle at 10% 20%,rgba(255,255,255,0.1) 0%,transparent 50%),
radial-gradient(circle at 90% 80%,rgba(255,255,255,0.08) 0%,transparent 50%);
animation:pulse 8s ease-in-out infinite;z-index:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(2deg)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 12px rgba(16,185,129,0.8))}
50%{filter:drop-shadow(0 0 20px rgba(16,185,129,1))}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.wrp{width:100%;height:100%;border:none;border-spacing:0;position:relative;z-index:1}
.c{text-align:center;padding:36px 32px;display:inline-block;
background:#ffffff;border-radius:24px;max-width:520px;min-width:420px;
box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
animation:slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.i{width:96px;height:96px;margin:0 auto 20px;animation:float 4s ease-in-out infinite}
.ic{animation:glow 2.5s ease-in-out infinite}
.hd{margin-bottom:24px}
h1{font-size:2.2em;margin-bottom:8px;font-weight:bold;color:#6366f1;letter-spacing:-0.03em}
.s{font-size:0.95em;color:#64748b;font-weight:500;margin-bottom:4px}
.bg{margin-top:8px;text-align:center}
.b{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.75em;
font-weight:bold;margin:0 3px;text-transform:uppercase}
.b1{background:#6366f1;color:#ffffff}
.b2{background:#10b981;color:#ffffff}
.b3{background:#f59e0b;color:#ffffff}
.st{background:#f8fafc;padding:14px 16px;margin:12px 0;border-radius:16px;
text-align:left;display:block;transition:all 0.3s ease;border:2px solid #e2e8f0;position:relative}
.st:hover{transform:translateX(6px);box-shadow:0 8px 16px rgba(0,0,0,0.1);border-color:#a5b4fc}
.n{width:32px;height:32px;background:#6366f1;color:#ffffff;border-radius:8px;
display:inline-block;text-align:center;line-height:32px;font-weight:bold;
margin-right:12px;vertical-align:middle}
.st-inner{display:inline-block;vertical-align:middle;width:calc(100% - 50px)}
.st b{display:block;margin-bottom:2px;font-size:1.05em;color:#1e293b}
.st span.txt{line-height:1.4;color:#64748b;font-size:0.92em}
.ft{margin-top:14px;font-size:0.82em;color:#94a3b8}
.ft a{color:#6366f1;text-decoration:none;font-weight:500}
.ft a:hover{text-decoration:underline}
</style>
</head>
<body>
<table class="wrp"><tr><td align="center" valign="middle">
<div class="c">
<svg class="i" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#a855f7;stop-opacity:1"/>
</linearGradient>
<filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
<feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.3"/>
</filter>
</defs>
<rect x="5" y="5" width="90" height="90" rx="12" fill="url(#g1)" filter="url(#sh)"/>
<rect x="18" y="18" width="64" height="74" rx="4" fill="#ffffff" opacity="0.95"/>
<path d="M 72 18 L 82 28 L 72 28 Z" fill="#e0e7ff"/>
<line x1="26" y1="32" x2="72" y2="32" stroke="#6366f1" stroke-width="2.5"/>
<line x1="26" y1="45" x2="62" y2="45" stroke="#a855f7" stroke-width="2.5"/>
<line x1="26" y1="58" x2="72" y2="58" stroke="#6366f1" stroke-width="2.5"/>
<circle class="ic" cx="75" cy="80" r="13" fill="#10b981"/>
<polyline points="68,80 72,85 82,73" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<div class="hd">
<h1>FatturaView</h1>
<p class="s">Visualizzatore Professionale Fatture Elettroniche PA</p>
<div class="bg">
<span class="b b1">XML/ZIP</span>
<span class="b b2">XSLT</span>
<span class="b b3">PDF</span>
</div>
</div>
<div class="st"><div class="n">1</div><div class="st-inner"><b>Apri Archivio</b><span class="txt">File - Apri archivio ZIP</span></div></div>
<div class="st"><div class="n">2</div><div class="st-inner"><b>Seleziona Fattura</b><span class="txt">Doppio click nella lista</span></div></div>
<div class="st"><div class="n">3</div><div class="st-inner"><b>Applica Stile</b><span class="txt">Ministero o Assosoftware</span></div></div>
<div class="st"><div class="n">4</div><div class="st-inner"><b>Stampa PDF</b><span class="txt">File - Stampa fatture</span></div></div>
<p class="ft"><a href="https://www.fatturaview.it">www.fatturaview.it</a></p>
</div>
</td></tr></table>
</body>
</html>

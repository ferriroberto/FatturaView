name: Build Linux (Qt6)

on:
  push:
    branches: [ develop, release/*, main ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-24.04

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Dipendenze sistema (NON Qt — gestito da install-qt-action)
      # -----------------------------------------------------------------------
      - name: Installa dipendenze sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config \
            libxml2-dev libxslt1-dev libzip-dev \
            libcups2-dev \
            libgl1-mesa-dev libgles2-mesa-dev \
            libvulkan-dev \
            libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-keysyms1-dev libxcb-render-util0-dev \
            libxcb-xinerama0-dev libxcb-xfixes0-dev \
            libxcb-cursor0 libglib2.0-0 \
            libnss3 libnspr4 libdbus-1-3 \
            libatk1.0-0 libatk-bridge2.0-0 \
            libexpat1 libdrm2 libgbm1

      # -----------------------------------------------------------------------
      # 3. Installa Qt6 ufficiale (completo, con WebEngine)
      # -----------------------------------------------------------------------
      - name: Installa Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version:   '6.7.3'
          host:      'linux'
          target:    'desktop'
          arch:      'linux_gcc_64'
          modules:   'qtwebengine qtwebchannel qtpositioning qtserialport'
          cache:     true

      # -----------------------------------------------------------------------
      # 4. Configurazione CMake (prefisso = AppDir/usr per linuxdeploy)
      # -----------------------------------------------------------------------
      - name: Configura CMake
        run: |
          cmake -S linux -B linux/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/AppDir/usr

      # -----------------------------------------------------------------------
      # 5. Build
      # -----------------------------------------------------------------------
      - name: Compila
        run: cmake --build linux/build --config Release --parallel

      # -----------------------------------------------------------------------
      # 6. Installa in AppDir e aggiunge icona + Resources
      # -----------------------------------------------------------------------
      - name: Prepara AppDir
        run: |
          cmake --install linux/build

          # Resources (fogli di stile XSL)
          mkdir -p AppDir/usr/share/fatturaview/Resources
          cp -r Resources/. AppDir/usr/share/fatturaview/Resources/

          # Icona (256x256 PNG richiesta da linuxdeploy)
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          ICON_SRC=""
          for f in FatturaView_icon.png FatturaView_new.png FatturaView_icon.png; do
            [ -f "$f" ] && ICON_SRC="$f" && break
          done
          if [ -n "$ICON_SRC" ]; then
            cp "$ICON_SRC" AppDir/usr/share/icons/hicolor/256x256/apps/fatturaview.png
          else
            # Fallback: converte l'ICO Windows in PNG
            sudo apt-get install -y --no-install-recommends imagemagick
            convert FatturaView.ico[0] -resize 256x256 \
              AppDir/usr/share/icons/hicolor/256x256/apps/fatturaview.png
          fi

      # -----------------------------------------------------------------------
      # 7. Crea AppImage autocontenuta (Qt + sistema + tutte le librerie)
      # -----------------------------------------------------------------------
      - name: Crea AppImage
        run: |
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          export EXTRA_QT_PLUGINS="webenginewidgets;webenginecore;webchannel;positioning;printsupport"
          export EXTRA_PLATFORM_PLUGINS="libqxcb.so;libqwayland-egl.so;libqwayland-generic.so"

          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --plugin qt \
            --output appimage

          # Rinomina con nome versione stabile
          mv FatturaView*.AppImage FatturaView-Linux-x64.AppImage

      # -----------------------------------------------------------------------
      # 8. Carica AppImage scaricabile da GitHub
      # -----------------------------------------------------------------------
      - name: Carica AppImage Linux
        uses: actions/upload-artifact@v4
        with:
          name: FatturaView-Linux-x64
          path: FatturaView-Linux-x64.AppImage
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Build Windows (opzionale — usa il .vcxproj esistente)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: |
          msbuild FatturaView.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /m `
            /nologo

      - name: Prepara pacchetto distribuibile
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows
          Copy-Item x64\Release\FatturaView.exe   dist\windows\
          Copy-Item Resources                      dist\windows\Resources -Recurse
          Copy-Item README.md                      dist\windows\
          Copy-Item GUIDA_USO.md                   dist\windows\
          Copy-Item TROUBLESHOOTING.md             dist\windows\

      - name: Carica artefatto Windows
        uses: actions/upload-artifact@v4
        with:
          name: FatturaView-Windows-x64
          path: dist/windows/
          retention-days: 30
